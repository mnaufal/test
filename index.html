<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; frame-src 'self' https://www.youtube.com;">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="referrer" content="no-referrer">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Harmony Huddle</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
:root{
  --teal:#0d9488;--teal-lt:#e0f7f5;--teal-dk:#0a7a70;
  --amber:#f59e0b;--shell:#1e293b;--surface:#f1f5f9;
  --white:#ffffff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;
  --red-lt:#fee2e2;--red:#991b1b;--grn-lt:#d1fae5;--grn:#065f46;
  --green-app:#25d366;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
html,body{margin:0;padding:0;width:100%;height:100%;font-family:var(--font);background:#0f172a;overflow:hidden;}
.phone{width:100%;height:100%;max-width:480px;background:var(--surface);border-radius:0;border:none;position:relative;overflow:hidden;display:flex;flex-direction:column;margin:0 auto;}
.notch{display:none;}
.home-bar{display:none;}
#app{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;width:100%;}
.scroll-area,.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.scroll-area::-webkit-scrollbar,.scroll::-webkit-scrollbar{display:none;}
.top-bar{background:var(--shell);padding:2rem 1rem .7rem;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:.5rem;flex-shrink:0;}
.top-bar-left{display:flex;align-items:center;gap:.4rem;}
.top-bar-title{font-size:.88rem;font-weight:700;}
.top-bar-right{display:flex;align-items:center;gap:.5rem;}
.icon-btn{display:flex;align-items:center;justify-content:center;padding:.3rem;border-radius:50%;color:#fff;transition:background .15s;}
.icon-btn:hover{background:rgba(255,255,255,.12);}
.speed-btn{display:flex;align-items:center;gap:.25rem;font-size:.7rem;font-weight:700;color:#fff;background:rgba(255,255,255,.2);border-radius:999px;padding:.25rem .65rem;transition:background .15s;}
.speed-btn:hover{background:rgba(255,255,255,.28);}
.speed-btn:active{transform:scale(.92);}
.speed-label-fast{color:#fbbf24;}
.tbar{background:var(--shell);padding:2rem 1rem .7rem;color:#fff;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tbar-l{display:flex;align-items:center;gap:.4rem;}
.tbar-r{display:flex;align-items:center;gap:.5rem;}
.tbar-t{font-size:.88rem;font-weight:700;}
.ibtn{display:flex;align-items:center;justify-content:center;padding:.3rem;border-radius:50%;color:#fff;transition:background .15s;}
.ibtn:hover{background:rgba(255,255,255,.12);}
.spbtn{display:flex;align-items:center;gap:.25rem;font-size:.7rem;font-weight:700;color:#fff;background:rgba(255,255,255,.2);border-radius:999px;padding:.25rem .65rem;}
.spbtn:active{transform:scale(.92);}
.phases{display:flex;gap:5px;align-items:center;}
.phase-dot,.pd{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25);transition:background .3s,transform .3s;}
.phase-dot.done,.pd.done{background:var(--teal);}
.phase-dot.active,.pd.now{background:var(--amber);transform:scale(1.4);}
.chat-body{padding:.9rem;display:flex;flex-direction:column;gap:.85rem;}
.msg-row{display:flex;flex-direction:column;}
.msg-row.me{align-items:flex-end;}
.msg-row.bot{align-items:flex-start;}
.msg-inner{display:flex;align-items:flex-end;gap:.4rem;}
.msg-row.me .msg-inner{flex-direction:row-reverse;}
.avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;color:#fff;flex-shrink:0;}
.bubble{max-width:82%;padding:.55rem .85rem;border-radius:18px;font-size:.82rem;line-height:1.55;font-weight:500;}
.bubble-me{background:var(--teal);color:#fff;border-bottom-right-radius:4px;}
.bubble-bot{background:var(--white);color:var(--text);border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.msg-label{font-size:.72rem;color:#475569;margin-top:.18rem;padding:0 2rem;}
.scr{display:flex;flex-direction:column;height:100%;min-height:0;}
.mrow{display:flex;flex-direction:column;}
.mrow.me{align-items:flex-end;}
.mrow.bot{align-items:flex-start;}
.minner{display:flex;align-items:flex-end;gap:.4rem;}
.mrow.me .minner{flex-direction:row-reverse;}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;color:#fff;flex-shrink:0;}
.bub{max-width:82%;padding:.55rem .85rem;border-radius:18px;font-size:.82rem;line-height:1.55;font-weight:500;}
.bub-me{background:var(--teal);color:#fff;border-bottom-right-radius:4px;}
.bub-bot{background:var(--white);color:var(--text);border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.mlabel{font-size:.72rem;color:#475569;margin-top:.18rem;padding:0 2rem;}
.typing-bubble,.typ-bub{display:flex;align-items:center;gap:5px;min-height:34px;}
.dot{width:7px;height:7px;border-radius:50%;background:#94a3b8;animation:bounce 1.2s infinite ease-in-out;}
.dot:nth-child(2){animation-delay:.16s;}
.dot:nth-child(3){animation-delay:.32s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.choices{margin-top:.5rem;display:flex;flex-direction:column;align-items:flex-end;gap:.35rem;padding-right:.2rem;}
.choices-label,.cl{display:none;}
.choice-btn,.cbtn{
  max-width:88%;text-align:left;padding:.6rem .9rem;
  border:none;border-radius:18px 18px 4px 18px;
  font-size:.82rem;font-weight:600;color:#0d5c54;
  background:rgba(13,148,136,.13);
  margin-bottom:0;transition:background .15s,transform .1s;
  line-height:1.45;cursor:pointer;
}
.choice-btn:hover,.cbtn:hover{background:rgba(13,148,136,.22);transform:translateY(-1px);}
.choice-btn:active,.cbtn:active{transform:scale(.98);}
.footer,.foot{background:var(--white);padding:.75rem;border-top:1px solid var(--border);flex-shrink:0;}
.btn-primary,.btn-p{width:100%;padding:.8rem;background:var(--teal);color:#fff;border-radius:999px;font-size:.9rem;font-weight:800;display:flex;align-items:center;justify-content:center;gap:.45rem;transition:background .15s,transform .1s;}
.btn-primary:hover,.btn-p:hover{background:var(--teal-dk);}
.btn-primary:active,.btn-p:active{transform:scale(.98);}
.btn-ghost,.btn-g{width:100%;padding:.75rem;background:var(--surface);color:var(--muted);border-radius:999px;font-size:.72rem;font-weight:800;display:flex;align-items:center;justify-content:center;gap:.4rem;letter-spacing:.05em;text-transform:uppercase;transition:background .15s;}
.btn-ghost:hover,.btn-g:hover{background:#e2e8f0;}
.fade-in,.fi{animation:fi .22s ease-out both;}
@keyframes fi{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse2{0%,100%{opacity:.8}50%{opacity:1}}
@keyframes badgePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
@keyframes completePop{0%{opacity:0;transform:scale(.7)}70%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.intro-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 2rem;text-align:center;background:linear-gradient(155deg,#0f766e 0%,#0d9488 50%,#134e4a 100%);position:relative;overflow:hidden;}
.intro-ring{position:absolute;border-radius:50%;border:28px solid rgba(255,255,255,.07);pointer-events:none;}
.intro-icon-wrap{width:70px;height:70px;background:rgba(255,255,255,.15);border-radius:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;box-shadow:0 8px 28px rgba(0,0,0,.2);}
.intro-title{font-size:2.3rem;font-weight:900;color:#fff;letter-spacing:-.03em;margin-bottom:.5rem;}
.intro-sub{font-size:.9rem;font-weight:600;color:rgba(255,255,255,.8);line-height:1.6;margin-bottom:2rem;}
.btn-start{background:#fff;color:var(--teal);padding:.9rem 2.4rem;border-radius:999px;font-size:1rem;font-weight:900;box-shadow:0 8px 24px rgba(0,0,0,.2);transition:transform .15s,box-shadow .15s;}
.btn-start:hover{transform:scale(1.05);box-shadow:0 12px 32px rgba(0,0,0,.3);}
.btn-start:active{transform:scale(.97);}
.intro-hint{font-size:.7rem;color:rgba(255,255,255,.45);font-weight:600;margin-top:1.2rem;}
.clock-body{padding:1.4rem 1.2rem;display:flex;flex-direction:column;gap:1.1rem;}
.field-label{font-size:.68rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem;}
.field-value{font-size:1rem;font-weight:800;color:var(--text);}
.spinner-wrap{background:#f8fafc;border:2px solid var(--border);border-radius:18px;padding:1.2rem;display:flex;align-items:center;justify-content:center;gap:.7rem;}
.spinner-col{display:flex;flex-direction:column;align-items:center;gap:.15rem;}
.spinner-val{font-size:2.5rem;font-weight:900;color:var(--text);min-width:3rem;text-align:center;line-height:1;}
.spinner-btn{min-width:44px;min-height:44px;padding:.3rem;color:var(--teal);border-radius:8px;transition:background .15s;display:flex;align-items:center;justify-content:center;}
.spinner-btn:hover{background:var(--teal-lt);}
.colon{font-size:2rem;font-weight:900;color:#cbd5e1;padding-bottom:.15rem;}
.hint-box{background:#fefce8;border:1.5px solid #f59e0b;border-radius:10px;padding:.65rem .9rem;font-size:.78rem;font-weight:700;color:#5c2d00;line-height:1.5;}
.feedback-box{border-radius:10px;padding:.75rem 1rem;font-size:.8rem;font-weight:800;text-align:center;line-height:1.5;}
.feedback-ok{background:var(--grn-lt);color:var(--grn);}
.feedback-err{background:var(--red-lt);color:var(--red);}
.end-wrap{flex:1;display:flex;flex-direction:column;align-items:center;padding:2rem 1.4rem;background:var(--surface);overflow-y:auto;text-align:center;}
.trophy{width:76px;height:76px;background:linear-gradient(135deg,#fbbf24,#f59e0b);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto 1.1rem;box-shadow:0 10px 30px rgba(245,158,11,.35);}
.end-title{font-size:1.7rem;font-weight:900;color:var(--text);margin-bottom:.6rem;letter-spacing:-.02em;}
.end-sub{font-size:.88rem;color:var(--muted);line-height:1.7;font-weight:500;margin-bottom:1.2rem;}
.learn-card{background:var(--white);border-radius:16px;padding:1rem;width:100%;margin-bottom:1.2rem;box-shadow:0 2px 12px rgba(0,0,0,.07);text-align:left;}
.learn-row{display:flex;gap:.55rem;font-size:.8rem;font-weight:600;color:#334155;line-height:1.5;margin-bottom:.5rem;}
.learn-row:last-child{margin-bottom:0;}
.rh{flex:1;display:flex;flex-direction:column;background:linear-gradient(160deg,#1e3a5f 0%,#1e293b 100%);position:relative;overflow:hidden;}
.rh-time{font-size:2.8rem;font-weight:900;color:#fff;text-align:center;padding:.2rem 0 .5rem;letter-spacing:-.02em;}
.rh-date{text-align:center;color:rgba(255,255,255,.5);font-size:.75rem;font-weight:600;margin-bottom:.8rem;}
.app-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.4rem;padding:1rem 1.5rem 2rem;}
.app-item{display:flex;flex-direction:column;align-items:center;gap:.4rem;}
.app-icon{width:58px;height:58px;border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.3);position:relative;transition:transform .15s;}
.app-icon:active{transform:scale(.93);}
.app-label{font-size:.72rem;font-weight:700;color:rgba(255,255,255,.85);text-align:center;}
.badge{position:absolute;top:-4px;right:-4px;width:14px;height:14px;background:#ef4444;border-radius:50%;border:2px solid #1e3a5f;animation:badgePulse 1.5s ease-in-out infinite;}
.tb-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:50;padding:1.5rem;background:rgba(0,0,0,.45);backdrop-filter:blur(2px);}
.tb-card{background:#fff;border-radius:18px;padding:1.3rem;max-width:270px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.4);animation:fi .3s ease-out;}
.tb-text{font-size:.85rem;line-height:1.65;color:var(--text);margin-bottom:1rem;font-style:italic;}
.tb-btn{width:100%;padding:.7rem;border-radius:12px;color:#fff;font-size:.85rem;font-weight:800;}
.fm-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:60;padding:1.5rem;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);}
.fm-card{background:#fff;border-radius:20px;padding:1.8rem 1.5rem;max-width:300px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:fi .4s ease-out;}
.wbar-input{background:#fff;border-radius:999px;padding:.5rem .9rem;display:flex;align-items:center;flex:1;min-width:0;height:38px;overflow-x:auto;scrollbar-width:none;box-shadow:0 1px 4px rgba(0,0,0,.1);gap:.3rem;}
.wbar-input::-webkit-scrollbar{display:none;}
.wchip{background:#dbeafe;color:#1e40af;font-size:.75rem;font-weight:700;padding:.2rem .6rem;border-radius:6px;white-space:nowrap;flex-shrink:0;transition:background .15s;}
.wchip:hover{background:#bfdbfe;}
.word-pool{display:flex;flex-wrap:wrap;justify-content:center;gap:.5rem;padding:1.5rem 1.2rem;}
.wword{background:#fff;border:2px solid #dbeafe;border-radius:999px;padding:.45rem .9rem;font-size:.82rem;font-weight:800;color:#1d4ed8;box-shadow:0 2px 6px rgba(0,0,0,.08);transition:background .15s,transform .1s;}
.wword:hover{background:#eff6ff;border-color:#93c5fd;transform:translateY(-1px);}
.wword:active{transform:scale(.95);}
.wsrc{padding:.75rem 2rem;background:#2563eb;color:#fff;border-radius:999px;font-size:.85rem;font-weight:800;transition:background .15s;}
.wsrc:hover{background:#1d4ed8;}
.wsrc:disabled{opacity:.4;cursor:default;}
.whist-row{background:#f3f4f6;padding:.5rem .8rem;border-radius:8px;font-size:.8rem;color:#4b5563;display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem;}
.kak-prog{display:flex;gap:3px;padding:.6rem .6rem .3rem;}
.kak-seg{height:3px;border-radius:999px;flex:1;transition:background .3s;}
.tube-thumb{background:#2a2a2a;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;}
.tube-play{width:52px;height:52px;background:rgba(0,0,0,.7);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.task-tag{background:#ef4444;color:#fff;font-size:.65rem;font-weight:800;padding:.18rem .5rem;border-radius:999px;display:inline-block;margin-bottom:.3rem;}
.chat-row-item{display:flex;align-items:center;padding:.9rem 1rem;border-bottom:1px solid #f1f5f9;gap:.75rem;cursor:pointer;transition:background .12s;}
.chat-row-item:hover{background:#f8fafc;}
.chat-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;flex-shrink:0;color:#fff;}
.chat-dot{width:10px;height:10px;background:var(--green-app);border-radius:50%;flex-shrink:0;}
.green-head{padding:2rem 1rem .7rem;color:#fff;font-weight:800;display:flex;align-items:center;gap:.5rem;flex-shrink:0;}
.call-av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;border:3px solid rgba(255,255,255,.25);}
.call-btn{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .15s;}
.call-btn:active{transform:scale(.9);}
.call-speech{background:rgba(255,255,255,.1);backdrop-filter:blur(8px);border-radius:16px;padding:.9rem 1rem;font-size:.88rem;font-weight:600;line-height:1.5;border-left:3px solid #22c55e;width:100%;margin-bottom:.7rem;}
.call-opt{background:rgba(255,255,255,.12);color:#fff;border-radius:12px;padding:.75rem .9rem;text-align:left;font-size:.82rem;font-weight:600;width:100%;margin-bottom:.4rem;transition:background .15s;}
.call-opt:hover{background:rgba(255,255,255,.2);}
.kak-sep{display:flex;align-items:center;gap:.5rem;margin:.3rem 0;}
.kak-sep-line{flex:1;height:1px;background:rgba(255,255,255,.1);}
.kak-seg-icon{font-size:.75rem;}
/* Warmth bar */
/* ── Friendship signal bars ── */
.fship-wrap{display:flex;align-items:center;gap:.5rem;padding:.25rem .6rem .2rem;cursor:pointer;position:relative;width:100%;}
.fship-label{font-size:.6rem;font-weight:800;color:rgba(255,255,255,.7);letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;}
.fship-bars{display:flex;align-items:flex-end;gap:2px;}
.fship-bar{width:5px;border-radius:2px 2px 0 0;transition:background .4s,height .3s;opacity:.25;background:rgba(255,255,255,.5);}
.fship-bar.active{opacity:1;}
.fship-tip{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 4px);background:#1e293b;color:#fff;font-size:.68rem;font-weight:600;line-height:1.5;padding:.5rem .75rem;border-radius:10px;white-space:nowrap;z-index:300;box-shadow:0 4px 16px rgba(0,0,0,.3);pointer-events:none;animation:lumiCardIn .2s ease-out;}
.fship-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1e293b;}
/* ═══ LUMI — AI GUIDE ═══ */
.lumi-bubble{position:absolute;bottom:1.1rem;right:1.1rem;z-index:200;display:flex;flex-direction:column;align-items:flex-end;pointer-events:auto;}
.lumi-orb{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#0d9488,#7c3aed);box-shadow:0 4px 16px rgba(13,148,136,.45);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s,box-shadow .2s;flex-shrink:0;position:relative;}
.lumi-orb:hover{transform:scale(1.08);box-shadow:0 6px 22px rgba(13,148,136,.55);}
.lumi-orb.pulse{animation:lumiPulse 1.6s ease-in-out infinite;}
.lumi-orb.urgent{animation:lumiUrgent 0.7s ease-in-out infinite;}
@keyframes lumiPulse{0%,100%{box-shadow:0 4px 16px rgba(13,148,136,.45)}50%{box-shadow:0 4px 24px rgba(13,148,136,.75),0 0 0 6px rgba(13,148,136,.18)}}
@keyframes lumiUrgent{0%,100%{box-shadow:0 4px 16px rgba(239,68,68,.5)}50%{box-shadow:0 4px 24px rgba(239,68,68,.8),0 0 0 8px rgba(239,68,68,.2)}}
.lumi-badge{position:absolute;top:-3px;right:-3px;width:14px;height:14px;background:#ef4444;border-radius:50%;border:2px solid #fff;animation:badgePulse 1.5s ease-in-out infinite;}
.lumi-card{background:#fff;border-radius:18px 18px 4px 18px;padding:.85rem 1rem;margin-bottom:.55rem;max-width:240px;box-shadow:0 8px 32px rgba(0,0,0,.18);animation:lumiCardIn .25s cubic-bezier(.34,1.56,.64,1) both;border:1.5px solid rgba(13,148,136,.15);}
.lumi-card.semi{max-width:280px;border-radius:18px;border-bottom-right-radius:4px;}
@keyframes lumiCardIn{from{opacity:0;transform:translateY(12px) scale(.92)}to{opacity:1;transform:translateY(0) scale(1)}}
.lumi-header{display:flex;align-items:center;gap:.45rem;margin-bottom:.45rem;}
.lumi-name{font-size:.62rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--teal);}
.lumi-msg{font-size:.8rem;color:#1e293b;line-height:1.6;font-weight:500;}
.lumi-cta{margin-top:.65rem;width:100%;padding:.55rem .8rem;border-radius:10px;font-size:.78rem;font-weight:800;color:#fff;background:linear-gradient(135deg,#0d9488,#7c3aed);display:flex;align-items:center;justify-content:center;gap:.35rem;transition:opacity .15s;}
.lumi-cta:hover{opacity:.88;}
.lumi-dismiss{margin-top:.4rem;width:100%;padding:.3rem;font-size:.7rem;font-weight:700;color:var(--muted);text-align:center;}
/* Semi-blocking overlay Lumi (for P2 thought-bubble moments) */
.lumi-semi-wrap{position:absolute;bottom:0;left:0;right:0;z-index:190;padding:.8rem .8rem 1rem;background:linear-gradient(to top,rgba(15,23,42,.72) 0%,rgba(15,23,42,.0) 100%);pointer-events:none;}
.lumi-semi-card{background:#fff;border-radius:18px;padding:1rem 1.1rem;box-shadow:0 8px 32px rgba(0,0,0,.25);pointer-events:auto;display:flex;gap:.7rem;align-items:flex-start;animation:lumiCardIn .3s cubic-bezier(.34,1.56,.64,1) both;}
.lumi-semi-face{flex-shrink:0;margin-top:.1rem;}

/* SLS-safe hover effects (replaces inline onmouseover handlers) */
[data-wtrend]:hover { background:#f3f4f6 !important; }
[data-tube]:hover { opacity:.85 !important; }
[id="btn-tube2-watch"]:hover { opacity:.85 !important; }
[data-p3rest]:hover { transform:translateY(-1px) !important; }
[data-p3add]:hover { background:#fff7ed !important; }
[data-irorel]:hover { opacity:.85 !important; }
</style>
</head>
<body>

function pad(n){return n<10?'0'+n:''+n;}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function nowTime(){const d=new Date();let h=d.getHours();const m=pad(d.getMinutes()),pm=h>=12?'PM':'AM';h=h%12||12;return `${h}:${m} ${pm}`;}
function spd(){return SPEEDS[S.speedIdx];}
function patch(ch){S=Object.assign({},S,ch);render();}
function clampWarmth(w){return Math.max(0,Math.min(100,w));}
function addWarmth(delta){return clampWarmth(S.warmth+delta);}

/* ═══ LUMI ENGINE ═══ */
function lumi(msg, cta=null, urgent=false, semi=false, key=null){
  // key: if set, only show this message once per game session
  if(key && S.lumiShown[key]) return;
  if(_lumiT){clearTimeout(_lumiT);_lumiT=null;}
  const shown = key ? Object.assign({},S.lumiShown,{[key]:true}) : S.lumiShown;
  S=Object.assign({},S,{
    lumiMsg:msg, lumiCTA:cta, lumiUrgent:urgent,
    lumiOpen:true, lumiSemi:semi, lumiShown:shown,
  });
  render();
  // Auto-dismiss: urgent=8s, semi=never (must tap), normal hint=6s
  if(!semi){
    _lumiT=setTimeout(()=>{
      S=Object.assign({},S,{lumiOpen:false,lumiUrgent:false});render();
      _lumiT=null;
    }, urgent?8000:6000);
  }
}
function lumiClose(){
  lumiCancelIdle();
  // Always record dismissed screen — prevents idle re-pop after ANY dismiss (urgent, idle, or tap)
  // lumiDismissedKey is reset when scene changes (lumiStartIdle detects key mismatch)
  S=Object.assign({},S,{lumiDismissedKey:lumiSceneKey()});
  _lumiIdlePop=false;
  if(_lumiT){clearTimeout(_lumiT);_lumiT=null;}
  // Immediate DOM hide before state update to prevent visible lag
  const bubble=document.querySelector('.lumi-bubble');
  const semi=document.querySelector('.lumi-semi-wrap');
  if(bubble){const card=bubble.querySelector('.lumi-card');if(card)card.style.display='none';}
  if(semi){semi.style.display='none';}
  S=Object.assign({},S,{lumiOpen:false,lumiUrgent:false,lumiSemi:false,lumiCTA:null,lumiMsg:''});
  render();
}
function lumiAction(action){
  lumiClose();
  // Re-use existing action system
  const fakeEl={dataset:{action}};
  const evt={target:{closest:()=>fakeEl}};
  // Dispatch the action directly
  switch(action){
    case 'tb-halal':  S=Object.assign({},S,{tbHalal:true});openWoogleTask('halal');break;
    case 'tb-hawker': S=Object.assign({},S,{tbHawker:true});openWoogleTask('hawker');break;
    case 'tb-rv':     clearAll();currentChoices=[];S=Object.assign({},S,{tbRV:true,rvStarted:true,sub:'chat-rv'});render();startRVLoop();break;
    case 'tb-hindu':  S=Object.assign({},S,{tbHindu:true});openWoogleTask('hindu');break;
    case 'tb-dev':    clearAll();currentChoices=[];S=Object.assign({},S,{tbDev:true,devStarted:true,sub:'chat-dev'});render();startDevLoop();break;
    case 'tb-they':   S=Object.assign({},S,{tbThey:true});navSub('tube');break;
    case 'p3-tb-chat':    p3NavSub('bes-chat');break;
    case 'p3-tb-deliver': p3NavSub('del-list');break;
    case 'goto-clickclock':  navSub('clickclock');break;
    case 'goto-via':
      clearAll();currentChoices=[];
      S=Object.assign({},S,{tbRV:true,rvStarted:true,sub:'chat-rv'});
      render();startRVLoop();break;
    case 'goto-dev':
      clearAll();currentChoices=[];
      S=Object.assign({},S,{tbDev:true,devStarted:true,sub:'chat-dev'});
      render();startDevLoop();break;
    case 'goto-woogle-halal':  S=Object.assign({},S,{tbHalal:true});openWoogleTask('halal');break;
    case 'goto-woogle-hawker': S=Object.assign({},S,{tbHawker:true});openWoogleTask('hawker');break;
    case 'goto-woogle-hindu':  S=Object.assign({},S,{tbHindu:true});openWoogleTask('hindu');break;
    case 'goto-tube':          S=Object.assign({},S,{tbThey:true});navSub('tube');break;
    case 'goto-p3-chat':       p3NavSub('bes-chat');break;
    case 'goto-p3-deliver':    p3NavSub('del-list');break;
  }
}

function renderLumi(){
  // Lumi orb is ALWAYS visible — student can tap anytime for a hint
  const hasMsg=S.lumiOpen&&S.lumiMsg;
  // Semi-blocking mode (P2 thought bubbles) — bottom gradient card
  if(hasMsg && S.lumiSemi){

/* ═══ LUMI IDLE TIMER ═══ */
function lumiStartIdle(){
  if(_lumiIdleT){clearTimeout(_lumiIdleT);_lumiIdleT=null;}
  const noIdle=['personalise','warm-entry','p1-p2-trans','reflection','info-card'];
  if(noIdle.includes(S.scene)) return;
  // If scene has changed since last dismiss, reset _lumiIdlePop so idle can fire again
  if(_lumiIdlePop && S.lumiDismissedKey && S.lumiDismissedKey!==lumiSceneKey()){
    _lumiIdlePop=false;
  }
  if(S.lumiOpen||_lumiIdlePop) return;
  // Don't fire idle if student just dismissed on this exact screen
  if(S.lumiDismissedKey && S.lumiDismissedKey===lumiSceneKey()) return;
  // Don't fire if Lumi already has a message loaded (just not shown)
  if(S.lumiMsg) return;
  _lumiIdleT=setTimeout(()=>{
    _lumiIdleT=null;
    if(!S.lumiOpen){
      // Re-check — student may have navigated away while timer was running
      if(S.lumiDismissedKey && S.lumiDismissedKey===lumiSceneKey()) return;
      _lumiIdlePop=true;
      lumiOnDemand();
    }
  },5000);
}
function lumiSceneKey(){
  // Returns a string representing current screen position
  // Used to track whether Lumi was dismissed on this exact screen
  return (S.scene||'')+(S.sub?':'+S.sub:'');
}
function lumiCancelIdle(){
  if(_lumiIdleT){clearTimeout(_lumiIdleT);_lumiIdleT=null;}
  // _lumiIdlePop is NOT reset on tap — only resets when scene changes (in lumiClose)
}

/* ═══ PART 1 CHAT ENGINE ═══ */
let currentChoices=[];
let pendingApproach=false; // true when we're about to show approach choice

function getP1Scenario(){
  if(S.scene==='group-confirm') return makeGroupConfirm(S.dinnerTime);
  if(S.scene==='riah-chat') return P1_SCENARIOS['riah-chat'];
  if(S.scene==='group-ask')    return P1_SCENARIOS['group-ask'];
  if(S.scene==='group-woogle') return P1_SCENARIOS['group-woogle'];
  if(S.scene==='group-assume') return P1_SCENARIOS['group-assume'];
  return P1_SCENARIOS['group-chat']||[];
}

function startP1Loop(){
  if(_timer){clearTimeout(_timer);_timer=null;}
  const sc=getP1Scenario();
  if(S.idx>=sc.length) return;
  const step=sc[S.idx];
  // Special approach choice — present 4 options with approach labels
  if(step.approachChoice){
    currentChoices=step.options;
    pendingApproach=true;
    render();return;
  }
  if(step.type==='choice'){currentChoices=step.options;pendingApproach=false;render();return;}
  const sp=spd();
  if(sp.typeMs>0){
    S=Object.assign({},S,{typing:step.sender});render();
    _timer=setTimeout(()=>{
      S=Object.assign({},S,{history:S.history.concat(step),idx:S.idx+1,typing:null});
      render();startP1Loop();
    },sp.typeMs);
  } else {
    _timer=setTimeout(()=>{
      S=Object.assign({},S,{history:S.history.concat(step),idx:S.idx+1});
      render();startP1Loop();
    },sp.ms);
  }
}

function pickChoice(i){
  clearAll();
  const text=currentChoices[i];
  if(pendingApproach){
    pendingApproach=false;
    // Determine which approach the player chose
    let approach,warmthDelta,nextScene;
    if(i===0){approach='private';warmthDelta=5;nextScene='riah-chat';}
    else if(i===1){approach='group';warmthDelta=0;nextScene='group-ask';}
    else if(i===2){approach='woogle';warmthDelta=2;nextScene='group-woogle';}
    else{approach='assume';warmthDelta=-8;nextScene='group-assume';setTimeout(()=>lumi("You assumed without checking. Riah agreed — but notice how her reply feels different.",null,true,false,'approach-assume'),1200);}
    currentChoices=[];
    S=Object.assign({},S,{
      history:S.history.concat({sender:'Me',text}),
      idx:S.idx+1,typing:null,
      riahApproach:approach,
      warmth:addWarmth(warmthDelta),
      conseqType:approach,
    });
    // Show consequence screen for all approach paths except 'assume' (has its own screen)
    if(approach==='assume'){
      S=Object.assign({},S,{scene:nextScene,history:[],idx:0,typing:null});
      render();startP1Loop();
      setTimeout(()=>lumi("You assumed without checking. Riah agreed — but notice how her reply feels different.",null,true,false,'approach-assume'),1200);
    } else {
      // Show consequence screen first; Continue button will navigate to nextScene
      S=Object.assign({},S,{scene:'p1-conseq'});
      render();
    }
    return;
  }
  currentChoices=[];
  // Track warmth for certain choices
  let wDelta=0;
  // In riah-chat: asking about iftar greeting (index 0 of that choice) = +3
  const isRiahGreeting=(S.scene==='riah-chat'&&S.idx===10&&i===0);
  if(isRiahGreeting) wDelta=3;
  S=Object.assign({},S,{history:S.history.concat({sender:'Me',text}),idx:S.idx+1,typing:null,warmth:addWarmth(wDelta)});
  if(isRiahGreeting){
    // Pause — show greeting consequence screen before Riah responds
    S=Object.assign({},S,{scene:'p1-riah-conseq'});
    render();
    return;
  }
  render();startP1Loop();
}

function confirmTime(){
  const h24=S.hour===12?(S.period==='AM'?0:12):(S.period==='PM'?S.hour+12:S.hour);
  const mins=h24*60+S.minute;
  const MIN=19*60+15,IDEAL=19*60+30,MAX=21*60;
  if(mins<MIN){lumi("It's not time to break fast yet. Set the time after 7:15 PM — that's when Riah can eat 🌙",null,true,false,'clock-too-early');return;}
  if(mins>MAX){lumi("That's quite late for dinner. Try a time between 7:15 PM and 9:00 PM.",null,true,false,'clock-too-late');return;}
  const dt=S.hour+':'+pad(S.minute)+' '+S.period;
  const msg=mins<=IDEAL?"✅ Perfect! Right after sunset (~7:15 PM).":"✅ A little late but still works. Proceeding…";
  patch({feedback:msg,feedbackOk:true,dinnerTime:dt});
  _timer=setTimeout(()=>{
    clearAll();currentChoices=[];
    S=Object.assign({},S,{scene:'group-confirm',history:[],idx:0,typing:null,feedback:''});
    render();startP1Loop();

function p3Validate(){
  const total=S.p3Cart.reduce((a,b)=>a+b.qty,0);
  const rest=S.p3Restaurant;
  // Validation errors use null key — always show when triggered, not suppressed after first view
  if(total!==5){lumi(`You have ${total} dish${total===1?'':'es'} — you need exactly 5. ${total<5?'Add '+(5-total)+' more.':'Remove '+(total-5)+'.'}`,null,true,false,null);return;}
  if(rest&&rest.id===3){lumi("Tommy's Western Grill is non-Halal and serves pork. Go back and choose a Halal-certified stall.",null,true,false,null);return;}
  if(S.p3Cart.some(i=>i.type==='beef')){lumi("There's beef in the order — Vani doesn't eat beef (Hindu practice). Remove those items before confirming.",null,true,false,null);return;}
  if(!S.p3Cart.some(i=>i.type==='veg')){lumi("Dev is vegetarian — add at least one dish labelled (Veg) to the order.",null,true,false,null);return;}
  if(!S.p3Cart.some(i=>i.type==='seafood')){lumi("Xing Yi asked for seafood 🦐 — add at least one seafood dish to the order.",null,true,false,null);return;}
  // Disposable cutlery is optional (food already Halal from Halal stall — no separation required)
  patch({p3OrderDone:true,sub:'del-success'});
}

function isActiveApp(id){
  if(id==='clickclock') return S.callFired&&!S.kakDone;

}

/* ═══ MAIN RENDER ═══ */
function getApp(){return document.getElementById('app');}
function render(){
  const appEl=getApp();if(!appEl)return;
  const chatScenes=['group-chat','riah-chat','group-ask','group-woogle','group-assume','group-confirm'];
  let html='';
  if(S.scene==='personalise')           html=renderPersonalise();
  else if(S.scene==='warm-entry')       html=renderWarmEntry();
  else if(S.scene==='info-card')        html=renderInfoCard();
  else if(S.scene==='reflection')       html=renderReflection();
  else if(S.scene==='intro')            html=renderIntro();
  else if(chatScenes.includes(S.scene)) html=renderChat();
  else if(S.scene==='clock')            html=renderClock();
  else if(S.scene==='end-scene')        html=renderEnd();
  else if(S.scene==='p1-conseq')         html=renderP1Conseq();
  else if(S.scene==='p1-riah-conseq')    html=renderRiahConseq();
  else if(S.scene==='p1-p2-trans')      html=renderTrans();
  else if(S.scene==='p2-xy')            html=renderXY();
  else if(S.scene==='p2-research')      html=renderResearch();
  else if(S.scene==='p3')               html=renderP3();
  // Lumi floats on every screen except the info-card (which is itself a guide overlay)
  const noLumi=S.scene==='info-card';
  appEl.innerHTML=html+(noLumi?'':renderLumi());
  // Scroll to bottom after layout paint — double rAF ensures DOM is fully laid out
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      const cw=document.getElementById('chatWin')||document.getElementById('cw');
      if(cw){
        cw.scrollTop=cw.scrollHeight;
        // Also scroll #anchor into view if present (more reliable for dynamic content)
        const anchor=document.getElementById('anchor');
        if(anchor) anchor.scrollIntoView({block:'end',behavior:'instant'});
      }
    });
  });
  if((S.scene==='p2-research'||S.scene==='p3')&&S.sub==='home'){
    if(!_clockT) _clockT=setInterval(()=>{const el=document.getElementById('home-clock');if(el) el.textContent=nowTime();},30000);
  } else {
    if(_clockT){clearInterval(_clockT);_clockT=null;}
  }
  lumiStartIdle();
}

/* ═══ EVENT LISTENER ═══ */
document.getElementById('app').addEventListener('click',function(e){
  lumiCancelIdle();
  const t=e.target.closest('[id],[data-action],[data-choice],[data-xypick],[data-rvpick],[data-devpick],[data-app],[data-cc],[data-tube],[data-wsel],[data-wdesel],[data-wtrend],[data-irorel],[data-chatnav],[data-p3app],[data-p3pick],[data-p3rest],[data-p3add],[data-p3rm],[data-filter],[data-bgval],[data-lumiaction]');
  if(!t) return;
  // Lumi button handlers — must be first to ensure immediate response
  if(t.dataset.lumiaction){lumiAction(t.dataset.lumiaction);return;}
  if(t.id==='btn-lumi-close'){lumiClose();return;}
  if(t.id==='btn-lumi-orb'){
    if(S.lumiOpen&&S.lumiMsg){lumiClose();}
    else{
      // Show hint for current screen/state on demand
      if(S.lumiMsg){S=Object.assign({},S,{lumiOpen:true});render();}
      else{lumiOnDemand();}
    }
    return;
  }
  if(t.id==='btn-fship-tip'){patch({fshipTip:!S.fshipTip});return;}
  // Auto-dismiss non-urgent floating Lumi card when user interacts with anything else
  // Urgent messages and semi-blocking cards require explicit "Got it" tap
  if(S.lumiOpen && !S.lumiUrgent && !S.lumiSemi){
    const bubble=document.querySelector('.lumi-bubble');
    const card=bubble?bubble.querySelector('.lumi-card'):null;
    if(card){card.style.display='none';}
    S=Object.assign({},S,{lumiOpen:false,lumiMsg:'',lumiCTA:null,lumiDismissedKey:lumiSceneKey()});
    // Don't call full lumiClose() — no need to re-render, just update state silently
  }
  if(t.dataset.bgval){patch({background:t.dataset.bgval});return;}
  if(t.dataset.irorel){openIRORelEntry(t.dataset.irorel);return;}
  if(t.dataset.filter){patch({menuFilter:t.dataset.filter,p3Feedback:''});return;}
  if(t.dataset.action){
    switch(t.dataset.action){
      case 'tb-halal':  S=Object.assign({},S,{tbHalal:true});openWoogleTask('halal');break;
      case 'tb-hawker': S=Object.assign({},S,{tbHawker:true});openWoogleTask('hawker');break;
      case 'tb-rv':     clearAll();currentChoices=[];S=Object.assign({},S,{tbRV:true,rvStarted:true,sub:'chat-rv'});render();startRVLoop();break;
      case 'tb-hindu':  S=Object.assign({},S,{tbHindu:true});openWoogleTask('hindu');break;
      case 'tb-dev':    clearAll();currentChoices=[];S=Object.assign({},S,{tbDev:true,devStarted:true,sub:'chat-dev'});render();startDevLoop();break;
      case 'tb-they':   S=Object.assign({},S,{tbThey:true});navSub('tube');break;
      case 'p3-tb-chat':    p3NavSub('bes-chat');break;
      case 'p3-tb-deliver': p3NavSub('del-list');break;
    }
    return;
  }
  if(t.dataset.choice!==undefined){pickChoice(parseInt(t.dataset.choice));return;}
  if(t.dataset.xypick!==undefined){xyPick(parseInt(t.dataset.xypick));return;}
  if(t.dataset.rvpick!==undefined){rvPick(parseInt(t.dataset.rvpick));return;}
  if(t.dataset.devpick!==undefined){devPick(parseInt(t.dataset.devpick));return;}
  if(t.dataset.p3pick!==undefined){p3Pick(parseInt(t.dataset.p3pick));return;}
  if(t.dataset.p3app){
    switch(t.dataset.p3app){
      case 'del-list':    p3NavSub('del-list');break;
      case 'chatlist-p3': p3NavSub('bes-chat');break;
      case 'p3-woogle':
      case 'p3-tube':
      case 'p3-cc':
        lumi("You've already completed this in Part 2. You're in Part 3 now — focus on AppsWhat and HawkerGo.",null,false,false,'p3-done-app');
        break;
    }
    return;
  }
  if(t.dataset.p3rest!==undefined){const rest=HAWKER_DATA.find(r=>r.id===parseInt(t.dataset.p3rest));if(rest){S=Object.assign({},S,{p3Restaurant:rest,p3Cart:[],p3Feedback:'',menuFilter:'all'});p3NavSub('del-menu');}return;}
  if(t.dataset.p3add!==undefined){p3AddToCart(parseInt(t.dataset.p3add));return;}
  if(t.dataset.p3rm!==undefined){p3RemoveFromCart(parseInt(t.dataset.p3rm));return;}
  if(t.dataset.app){
    switch(t.dataset.app){
      case 'woogle':     openWoogle();break;
      case 'tube':       navSub('tube');break;
      case 'clickclock': navSub('clickclock');break;
      case 'chatlist':   navSub('chatlist');break;
      case 'deliver':    if(S.langarDone){goP3();}else{lumi("Finish your research first — you still need to know what everyone can eat before ordering!",null,true,false,'deliver-early');}break;
    }
    return;
  }
  if(t.dataset.cc==='kak'){navSub('kak');return;}
  if(t.dataset.tube){navSub('tube-r');return;}
  if(t.dataset.wsel!==undefined){wSel(parseInt(t.dataset.wsel));return;}
  if(t.dataset.wdesel!==undefined){wDesel(parseInt(t.dataset.wdesel));return;}
  if(t.dataset.wtrend){patch({sub:'woogle-r',wResult:t.dataset.wtrend});return;}
  if(t.dataset.chatnav){
    const dest=t.dataset.chatnav;
    // Allow direct tap into VIA/Dev chats — start the loop if not yet started
    if(dest==='chat-rv'){
      clearAll();currentChoices=[];
      S=Object.assign({},S,{tbRV:true,rvStarted:true,sub:'chat-rv'});
      render();startRVLoop();return;
    }
    if(dest==='chat-dev'){
      clearAll();currentChoices=[];
      S=Object.assign({},S,{tbDev:true,devStarted:true,sub:'chat-dev'});
      render();startDevLoop();return;
    }
    navSub(dest);return;
  }

  switch(t.id){
    case 'btn-trans-skip':  clearAll();goToPart2();break;
    case 'btn-start':       handleStart();break;
    case 'btn-back':
      if(S.scene==='p2-research'){if(S.sub!=='home')navSub('home');}
      else handleBack();
      break;
    case 'btn-next':        handleNext();break;
    case 'btn-skip':        skipAll();break;
    case 'btn-speed':       patch({speedIdx:(S.speedIdx+1)%SPEEDS.length});break;
    case 'hour-up':         adjustHour(1);break;
    case 'hour-dn':         adjustHour(-1);break;
    case 'min-up':          adjustMin(1);break;
    case 'min-dn':          adjustMin(-1);break;
    case 'period-up':
    case 'period-dn':       togglePeriod();break;
    case 'btn-confirm-time':confirmTime();break;
    case 'btn-continue-p2': goToPart2();break;
    case 'btn-again':       handlePlayAgain();break;
    case 'btn-p2-start':    goScene2('p2-xy');break;
    case 'btn-to-research': S=Object.assign({},S,{xyChatDone:true});showInfoCard('buddhism','p2-research');break;
    case 'btn-xy-skip':     xySkip();break;
    case 'btn-wreset':      wReset();break;
    case 'btn-wsearch':     wSearch();break;
    case 'btn-back-wr':     navSub('woogle');break;
    case 'btn-home-from-wr':navSub('home');break;
    case 'btn-kak-next':    if(S.kakIdx<KAK_SCRIPT.length-1)patch({kakIdx:S.kakIdx+1});break;
    case 'btn-kak-done':    if(S.callFired)S=Object.assign({},S,{kakDone:true,kakIdx:0});else S=Object.assign({},S,{kakIdx:0});navSub('home');break;
    case 'btn-rv-done':     showInfoCard('hinduism','p2-research');break;
    case 'btn-rv-continue': S=Object.assign({},S,{sub:'chat-rv'});render();startRVLoop();break;
    case 'btn-p1-conseq-continue':{
      // Navigate to the right sub-scenario stored in conseqType
      const ct=S.conseqType;
      const nextSc=ct==='private'?'riah-chat':ct==='group'?'group-ask':ct==='woogle'?'group-woogle':'group-chat';
      S=Object.assign({},S,{scene:nextSc,history:[],idx:0,typing:null});
      render();startP1Loop();
      break;
    }
    case 'btn-riah-conseq-continue':{
      // Resume riah-chat from where we left off (idx already incremented)
      S=Object.assign({},S,{scene:'riah-chat'});
      render();startP1Loop();
      break;
    }
    case 'btn-dev-done':    showInfoCard('sikhism','p2-research');break;
    case 'btn-tube-done':   if(S.devDone)S=Object.assign({},S,{langarDone:true});navSub('home');break;
    case 'btn-tube2-watch': navSub('tube-r2');break;
    case 'btn-tube2-done':  navSub('home');break;
    case 'btn-accept':      patch({sub:'video-call',callStep:0});break;
    case 'btn-decline':     navSub('home');break;
    case 'btn-call-reply':  if(S.callStep<CALL_SCRIPT.length-1)patch({callStep:S.callStep+1});else patch({sub:'call-end'});break;
    case 'btn-end-call':    patch({sub:'call-end'});break;
    case 'btn-goto-cc':     showInfoCard('islam','p2-clickclock');break;
    case 'btn-call-home':   navSub('home');break;
    case 'btn-info-dismiss':dismissInfoCard();break;
    case 'btn-refl-again':  handlePlayAgain();break;
    case 'btn-pers-continue': if(S.background){patch({scene:'warm-entry'});}break;
    case 'btn-pers-skip':   patch({scene:'warm-entry',background:'unsure'});break;
    case 'btn-warm-start':  handleStart();break;
    case 'btn-to-p3':       goP3();break;
    case 'btn-p3-back-home':S=Object.assign({},S,{sub:'home'});render();break;
    case 'btn-p3-back-list':p3NavSub('del-list');break;
    case 'btn-p3-back-menu':p3NavSub('del-menu');break;
    case 'btn-p3-home-from-chat':p3NavSub('home');break;
    case 'btn-p3-to-checkout':   p3NavSub('del-checkout');break;
    case 'btn-p3-cutlery':  patch({p3Containers:!S.p3Containers,p3Feedback:''});break;
    case 'btn-p3-place-order':p3Validate();break;
    case 'btn-p3-play-again':handlePlayAgain();break;
    case 'btn-go-reflection':startReflection();break;
  }
});
